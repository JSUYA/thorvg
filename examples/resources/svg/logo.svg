<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="600" height="300" fill="#FFFFFF"/>
  <!-- Section Title -->
  <text x="10" y="20" font-size="16px" font-weight="bold">EM UNIT TEST</text>

  <!-- 1. Base font-size = 20px -->
  <text x="10" y="60" font-size="20px" fill="black">
    Base font-size = 20px → 1em = 20px
  </text>

  <!-- Rectangle using 1em width/height with base font-size 20px -->
  <g font-size="20px">
    <rect x="10" y="70" width="1em" height="1em" fill="#4CAF50" opacity="0.7"></rect>
    <text x="40" y="90" font-size="14px">Rect (1em × 1em = 20px × 20px)</text>
  </g>

  <!-- 2. Base font-size = 40px -->
  <text x="10" y="140" font-size="40px" fill="black">
    Base font-size = 40px → 1em = 40px
  </text>

  <!-- Rectangle using 1em with base font-size 40px -->
  <g font-size="40px">
    <rect x="10" y="150" width="1em" height="1em" fill="#2196F3" opacity="0.7"></rect>
    <text x="60" y="180" font-size="14px">Rect (1em × 1em = 40px × 40px)</text>
  </g>


</svg>
